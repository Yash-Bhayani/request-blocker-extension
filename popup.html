<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body x-data="popupManager">

<div class="header">
    <h3>Request Blocker</h3>
    <div class="current-domain" x-text="currentHost ? 'Viewing: ' + currentHost : 'Ready'"></div>
</div>

<div class="content" style="padding: 15px;">
    <div x-show="activeSiteRules.length === 0" class="empty-state">
        No active rules for this website.
    </div>

    <template x-for="rule in activeSiteRules" :key="rule.id">
        <div class="rule" :style="rule.active ? '' : 'opacity: 0.6;'">
            <span class="rule-name" x-text="rule.name || 'Custom Rule'" :title="rule.name"></span>

            <label class="switch">
                <input type="checkbox" :checked="rule.active" @change="toggleRule(rule.id, $event.target.checked)">
                <span class="slider"></span>
            </label>
        </div>
    </template>

    <button class="btn-manage" @click="openOptions()" style="margin-top: 15px;">
        ⚙️ Manage Rules
    </button>
</div>

<script type="module" src="./src/alpine-popup.js"></script>
</body>
</html>
