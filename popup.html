<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="./dist/popup.js"></script>
</head>

<body x-data="popupManager">

<div class="header">
    <h3>Request Blocker</h3>
    <div class="current-domain" x-text="currentHost ? 'Viewing: ' + currentHost : 'Ready'"></div>
</div>

<div class="content">
    <div x-show="rules.length === 0" class="empty-state" x-cloak>
        No rules created yet.
    </div>

    <template x-for="rule in rules" :key="rule.id">
        <div class="rule" :style="rule.active ? '' : 'opacity: 0.6;'">
            <span class="rule-name" x-text="rule.name || 'Custom Rule'" :title="rule.name"></span>

            <label class="switch">
                <input type="checkbox" :checked="rule.active" @change="toggleRule(rule.id, $event.target.checked)">
                <span class="slider"></span>
            </label>
        </div>
    </template>

    <button class="btn-manage" @click="openOptions()">
        ⚙️ Manage Rules
    </button>
</div>

</body>
</html>
